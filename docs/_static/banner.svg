<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-label="invoice2data — extract structured data from PDF invoices">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="960" height="240" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="240" rx="4" fill="url(#accent)"/>

  <!-- invoice glyph -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="104" height="128" rx="10" fill="#f8fafc"/>
    <rect x="18" y="22" width="68" height="9" rx="4.5" fill="#94a3b8"/>
    <rect x="18" y="44" width="50" height="7" rx="3.5" fill="#cbd5e1"/>
    <rect x="18" y="60" width="68" height="7" rx="3.5" fill="#cbd5e1"/>
    <rect x="18" y="76" width="40" height="7" rx="3.5" fill="#cbd5e1"/>
    <rect x="18" y="100" width="68" height="10" rx="5" fill="url(#accent)"/>
    <!-- arrow out -->
    <path d="M120 64 h54 m0 0 l-16 -14 m16 14 l-16 14" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(300,0)" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="0" y="118" font-size="62" font-weight="700" fill="#f8fafc">invoice<tspan fill="url(#accent)">2</tspan>data</text>
    <text x="2" y="158" font-size="25" font-weight="400" fill="#cbd5e1">Extract structured data from PDF invoices</text>
    <text x="2" y="190" font-size="17" font-weight="400" fill="#64748b">templates &#183; pluggable backends &#183; optional AI &#183; CSV / JSON / XML</text>
  </g>
</svg>
