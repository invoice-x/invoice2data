<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="invoice2data">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- self-contained tile so it reads on any background -->
  <rect width="96" height="96" rx="20" fill="url(#bg)"/>

  <!-- invoice card -->
  <rect x="18" y="21" width="40" height="54" rx="6" fill="#f8fafc"/>
  <rect x="25" y="32" width="26" height="5" rx="2.5" fill="#94a3b8"/>
  <rect x="25" y="43" width="18" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="25" y="52" width="26" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="25" y="63" width="26" height="6" rx="3" fill="url(#accent)"/>

  <!-- extraction arrow -->
  <path d="M62 48 h17 m0 0 l-9 -8 m9 8 l-9 8" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
